<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gameboy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="direction-keys">
      <button class="arrow-key" id="btn-up" onclick="btnUp()">⬆️</button>
      <button class="arrow-key" id="btn-down" onclick="btnDown()">⬇️</button>
      <button class="arrow-key" id="btn-right" onclick="btnRight()">➡️</button>
      <button class="arrow-key" id="btn-left" onclick="btnLeft()">⬅️</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
